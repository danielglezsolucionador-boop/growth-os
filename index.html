    if(page==='dashboard') return h(Dashboard,{user});
    if(page==='ideas') return h(IdeaEngine,null);
    if(page==='content') return h(ContentGenerator,null);
    if(page==='hub') return h(ContentHub,null);
    if(page==='clients') return h(ClientSystem,null);
    if(page==='settings') return h(ApiSettings,null);
    if(page==='help') return h(HelpCenter,null);
  };
  return h('div',{className:'app-shell'},
    h('div',{className:'sidebar'},
      h('div',{className:'sidebar-logo'},
        h('div',{className:'logo-row'},
          h('div',{className:'logo-dot'},h('svg',{width:12,height:12,viewBox:'0 0 14 14',fill:'none'},h('polygon',{points:'7,1 9,5 13,5.5 10,8.5 10.8,13 7,11 3.2,13 4,8.5 1,5.5 5,5',fill:'#fff'}))),
          h('div',null,h('div',{className:'logo-name'},'Lab. Crecimiento'),h('div',{className:'logo-badge'},'v4.0'))
        )
      ),
      h('div',{className:'sidebar-nav'},
        h('div',{className:'nav-section'},'Principal'),
        NAV.map(n=>h('div',{key:n.id,className:'nav-item'+(page===n.id?' active':''),onClick:()=>setPage(n.id)},
          h(Icon,{name:n.icon}),n.label
        ))
      ),
      h('div',{className:'sidebar-footer'},
        h('div',{className:'user-row'},
          h('div',{className:'user-av'},user.name.slice(0,2).toUpperCase()),
          h('div',{className:'user-info'},
            h('div',{className:'user-name'},user.name),
            h('div',{className:'user-role'},user.role)
          ),
          h('div',{style:{cursor:'pointer',color:'var(--color-text-tertiary,#999)'},onClick:()=>setUser(null)},h(Icon,{name:'logout',size:14}))
        )
      )
    ),
    h('div',{className:'main'},
      h('div',{className:'topbar'},
        h('div',{className:'topbar-title'},PAGE_TITLES[page]),
        h('div',{className:'topbar-right'},
          page==='ideas'&&h('button',{className:'btn btn-sm'},'Experimento A/B'),
          page==='hub'&&h('button',{className:'btn btn-sm',style:{display:'flex',alignItems:'center',gap:4}},h(Icon,{name:'download',size:12}),' Exportar todo'),
          h('span',{className:'badge badge-green'},'Núcleo activo')
        )
      ),
      h('div',{className:'content-area'},renderPage())
    )
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(h(App,null));
</script>
